{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ERP Dashboard • Inspired</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'dashboard/css/style.css' %}">
  </head>
  <body>
    <div class="d-flex" id="wrapper">
      <!-- Sidebar -->
      <div id="sidebar" class="border-end">
        <div class="sidebar-heading text-center py-4">
          <img src="{% static 'dashboard/images/logo.svg' %}" alt="logo" class="logo">
          <div class="brand-text">ERP • Inspired</div>
        </div>
        <div class="list-group list-group-flush">
          {% for item in menu %}
            <a href="#" class="list-group-item list-group-item-action sidebar-item">
              <i class="fa {{ item.icon }} me-2"></i> {{ item.name }}
            </a>
          {% endfor %}
        </div>
      </div>
      <!-- /#sidebar -->

      <!-- Page content -->
      <div id="page-content-wrapper" class="w-100">
        <nav class="navbar navbar-expand-lg navbar-light border-bottom">
          <div class="container-fluid">
            <button class="btn btn-sm btn-outline-secondary" id="sidebarToggle"><i class="fa fa-bars"></i></button>

            <form class="d-none d-md-flex ms-3" role="search">
              <input class="form-control form-control-sm" type="search" placeholder="Search (invoices, items, parties)" aria-label="Search">
            </form>

            <div class="ms-auto d-flex align-items-center">
              <div class="me-3 text-end d-none d-md-block">
                <div style="font-size:0.9rem">Welcome, Admin</div>
                <div style="font-size:0.75rem;color:#666">Last login: --</div>
              </div>
              <div class="avatar">
                <i class="fa fa-user-circle fa-2x"></i>
              </div>
            </div>
          </div>
        </nav>

        <div class="container-fluid p-4">
          {% block content %}{% endblock %}
        </div>
      </div>
      <!-- /#page-content-wrapper -->
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'dashboard/js/dashboard.js' %}"></script>
  </body>
</html>
