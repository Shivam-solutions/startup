{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ERP Dashboard • Inspired</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'dashboard/css/style.css' %}">
  </head>
  <body>
    <div class="d-flex" id="wrapper">
      <!-- Sidebar -->
      <div id="sidebar" class="border-end">
        <div class="sidebar-heading text-center py-4">
          <img src="{% static 'dashboard/images/logo.svg' %}" alt="logo" class="logo">
          <div class="brand-text">ERP • Inspired</div>
        </div>

        <div class="list-group list-group-flush">
          {% for item in menu %}
            {% if item.name == 'Sales' %}
              <a href="{% url 'sales_entry' %}" class="list-group-item list-group-item-action sidebar-item">
                <i class="fa {{ item.icon }} me-2"></i> {{ item.name }}
              </a>
            {% elif item.name == 'Inventory' %}
              <a href="{% url 'inventory' %}" class="list-group-item list-group-item-action sidebar-item">
                <i class="fa {{ item.icon }} me-2"></i> {{ item.name }}
              </a>
            {% else %}
              <a href="#" class="list-group-item list-group-item-action sidebar-item">
                <i class="fa {{ item.icon }} me-2"></i> {{ item.name }}
              </a>
            {% endif %}
          {% endfor %}
        </div>
      </div>
      <!-- /#sidebar -->

      <!-- Page content -->
      <div id="page-content-wrapper" class="w-100">

        <nav class="navbar navbar-expand-lg navbar-light border-bottom">
          <div class="container-fluid">
            <button class="btn" id="menu-toggle"><i class="fa fa-bars"></i></button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">
              <ul class="navbar-nav ms-auto mt-2 mt-lg-0">
                <li class="nav-item">
                  <a class="nav-link" href="#">Welcome</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="#">Profile</a>
                </li>
              </ul>
            </div>
          </div>
        </nav>

        <div class="container-fluid p-4">
          {% block content %}{% endblock %}
        </div>
      </div>
      <!-- /#page-content-wrapper -->
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'dashboard/js/dashboard.js' %}"></script>
  </body>
</html>
